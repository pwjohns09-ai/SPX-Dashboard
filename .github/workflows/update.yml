name: Daily Data Update

on:
  schedule:
    # 10pm UTC = 5pm ET, Mon-Fri (after market close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update market data (CSV only, skip backtest)
        run: python fetch_spx_data.py --no-compute

      - name: Regenerate v3 indicator
        run: python v3/calculate_indicator.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spx_data.csv v3/indicator.json
          git diff --staged --quiet || git commit -m "Daily update $(date -u '+%Y-%m-%d')"
          git push
